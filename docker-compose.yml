services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DBS: ${POSTGRES_DBS}
    volumes:
      - ./scripts/create-dbs.sh:/docker-entrypoint-initdb.d/create-dbs.sh
      - ./data/postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: ghcr.io/jeliebig/adminer-autologin
    container_name: adminer
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADMINER_PLUGINS: login-env-vars
      ADMINER_DRIVER: pgsql
      ADMINER_SERVER: postgres
      ADMINER_USERNAME: ${POSTGRES_USER}
      ADMINER_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped

  openinary:
    image: openinary/openinary:latest
    container_name: openinary
    ports:
      - "3000:3000"
    platform: linux/amd64
    volumes:
      - ./data/openinary-cache:/app/apps/api/cache
      - ./data/openinary-public:/app/apps/api/public
      - ./data/openinary-db:/app/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - 8025:8025 # UI
      - 1025:1025 # SMTP
    volumes:
      - ./data/mailpit-data:/data
    restart: unless-stopped
